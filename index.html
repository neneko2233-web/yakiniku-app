<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="焼肉きんぐ">
    <title>焼肉きんぐ 公式アプリ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #e60012;
            --dark-red: #9e000c;
            --gold-gradient: linear-gradient(135deg, #f1d37f 0%, #d4af37 50%, #aa8214 100%);
            --silver-gradient: linear-gradient(135deg, #ffffff 0%, #dcdcdc 40%, #999999 100%);
            --bg-black: #121212;
            --text-white: #ffffff;
            --text-dark: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-black); color: var(--text-white); overflow-x: hidden; padding-bottom: calc(75px + env(safe-area-inset-bottom)); padding-top: 60px; }

        /* Fixed Top Header */
        header { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #ffffff; color: #000000; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; z-index: 2000; border-bottom: 1px solid #e0e0e0; padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
        .header-left i, .header-right i { font-size: 24px; color: #333; cursor: pointer; }
        .header-left { position: relative; display: flex; align-items: center; height: 100%; }
        .notification-badge { position: absolute; top: calc(8px + env(safe-area-inset-top)); right: -10px; background: var(--primary-red); color: #ffffff; font-size: 11px; font-weight: bold; border-radius: 10px; padding: 2px 6px; transform: scale(0.85); }
        .header-logo { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header-logo .logo-top { font-size: 9px; font-weight: bold; color: var(--primary-red); letter-spacing: 1px; margin-bottom: -2px; }
        .header-logo .logo-main { font-size: 20px; font-weight: 900; letter-spacing: 0.5px; color: #000000; display: flex; align-items: center; }
        .header-logo .logo-main span { background: #000; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; margin-right: 4px; font-weight: bold; }

        /* Main Container Pages */
        .app-page { display: none; width: 100%; animation: fadeIn 0.2s ease-out; }
        .app-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PAGE: POLICE ACTIVE BARCODE (BEAUTIFIED) --- */
        .police-detail-screen {
            background-color: #1a1a1a;
            position: relative;
            min-height: 100vh;
            padding: 0 16px 20px 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Subtle diagonal caution tape pattern background */
        .caution-tape-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.08;
            background-image: repeating-linear-gradient(
                -45deg,
                #000 0,
                #000 30px,
                #ffe600 30px,
                #ffe600 60px
            );
            z-index: 0;
            pointer-events: none;
        }

        .police-content-wrapper { width: 100%; max-width: 400px; position: relative; z-index: 1; }

        .yakiniku-police-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0 15px 0;
        }
        .yp-badge-icon {
            font-size: 42px;
            color: #d4af37;
            margin-right: 12px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
            background: -webkit-linear-gradient(135deg, #f1d37f, #aa8214);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .yp-title-box { display: flex; flex-direction: column; }
        .yp-title-box span:nth-child(1) { color: #fff; font-size: 22px; font-weight: 900; letter-spacing: 2px; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .yp-title-box span:nth-child(2) { color: #fff; font-size: 28px; font-weight: 900; letter-spacing: 2px; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-top: 2px; }

        /* Solid Yellow Banner */
        .yellow-coupon-ribbon {
            background: #fffb00;
            color: #000;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 4px;
            padding: 6px 0;
            text-align: center;
            margin: 0 -16px 20px -16px;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Pure White Barcode Card */
        .barcode-main-card {
            background: #ffffff;
            color: #000000;
            border-radius: 12px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            margin-bottom: 16px;
        }
        .barcode-instruction-txt { font-size: 11px; font-weight: 800; color: #555; margin-bottom: 16px; letter-spacing: 0.5px; }
        
        /* High-fidelity CSS Barcode */
        .css-barcode-graphic {
            display: inline-flex;
            align-items: stretch;
            height: 75px;
            background: #fff;
            padding: 0 10px;
            margin: 5px 0;
        }
        .barcode-line { background: #000; margin-right: 1.5px; width: 2px; }
        .barcode-line.w-1 { width: 1.5px; }
        .barcode-line.w-3 { width: 3.5px; }
        .barcode-line.w-4 { width: 5px; }
        .barcode-line.space-sm { margin-right: 4px; }
        .barcode-line.space-md { margin-right: 6px; }

        .barcode-numerical-string { font-size: 14px; font-weight: 800; color: #000; margin-top: 8px; letter-spacing: 1.5px; }

        /* Metallic Rank Badge Card Component */
        .silver-metallic-card {
            background: var(--silver-gradient);
            border: 1.5px solid #fff;
            border-radius: 6px;
            padding: 20px;
            color: #111;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 16px;
            position: relative;
        }
        .metallic-card-dept { font-size: 10px; font-weight: 800; letter-spacing: 1px; color: #444; margin-bottom: 10px; }
        .metallic-card-rank-row { display: flex; align-items: center; margin-bottom: 12px; }
        .metallic-card-rank-row img { width: 24px; height: 24px; margin-right: 8px; }
        .metallic-card-rank-row .rank-text { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        
        .divider-lines { border-top: 1px solid #777; border-bottom: 1px solid #777; height: 3px; margin: 10px 0; }
        
        .metallic-card-pct-row { display: flex; align-items: baseline; justify-content: center; margin-top: 10px; }
        .metallic-card-pct-row .small-text { font-size: 12px; font-weight: 900; margin-right: 15px; }
        .metallic-card-pct-row .big-pct { font-size: 54px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .metallic-card-pct-row .big-pct span { font-size: 28px; margin-left: 2px; }

        /* Timer Pill */
        .timer-countdown-pill {
            background: #ffffff;
            color: #000000;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            margin: 0 auto 16px auto;
            width: 70%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .timer-countdown-pill i { color: #666; margin-right: 10px; font-size: 18px; }
        .timer-countdown-pill .time-digits { font-size: 18px; margin-left: 15px; font-weight: 900; letter-spacing: 1px; color: #d32f2f; }

        /* Footer Notes Card */
        .police-footer-notes {
            background: #ffffff;
            border-radius: 12px 12px 0 0;
            padding: 20px;
            color: #000;
            width: 100%;
        }
        .police-footer-notes h4 { font-size: 14px; font-weight: 900; margin-bottom: 10px; }
        .police-footer-notes p { font-size: 16px; color: var(--primary-red); font-weight: 900; line-height: 1.4; }

        /* --- FIXED BOTTOM TAB NAVIGATION BAR (Unchanged) --- */
        .fixed-bottom-navigation-tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #ffffff; border-top: 1px solid #dddddd; display: flex; justify-content: space-around; align-items: center; z-index: 3000; padding-bottom: env(safe-area-inset-bottom); height: calc(65px + env(safe-area-inset-bottom)); }
        .nav-item-node { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; height: 100%; color: #666666; font-size: 9px; font-weight: 800; cursor: pointer; transition: color 0.15s; }
        .nav-item-node i { font-size: 21px; margin-bottom: 2px; }
        .nav-item-node.active-route { color: var(--primary-red); }
        .central-badge-anchor-point { width: 20%; position: relative; display: flex; justify-content: center; height: 100%; }
        .floating-police-badge-trigger { position: absolute; bottom: calc(12px + env(safe-area-inset-bottom)); width: 72px; height: 76px; background: var(--gold-gradient); border-radius: 12px 12px 40px 40px; border: 2px solid #292524; box-shadow: 0 -3px 12px rgba(0,0,0,0.35); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ffffff; font-size: 9px; font-weight: 900; z-index: 3500; cursor: pointer; }
        .floating-police-badge-trigger i { font-size: 26px; color: #ffffff; margin-bottom: 2px; text-shadow: 0 1.5px 3px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <!-- TOP GLOBAL APP HEADER -->
    <header>
        <div class="header-left"><i class="fa-regular fa-bell"></i><span class="notification-badge">39</span></div>
        <div class="header-logo">
            <div class="logo-top">お席で注文 食べ放題</div>
            <div class="logo-main"><span>肉</span>焼肉きんぐ</div>
        </div>
        <div class="header-right"><i class="fa-solid fa-bars"></i></div>
    </header>

    <!-- TAB PAGE 1: HOME (Simplified for this snippet, focusing on Police Page) -->
    <div id="route-home" class="app-page">
        <div style="padding: 20px; text-align: center; color: #888;">
            <br><br><br>
            <i class="fa-solid fa-house" style="font-size: 40px; margin-bottom: 10px;"></i>
            <h3>ホーム画面</h3>
            <p style="font-size: 12px; margin-top: 10px;">※ 请点击底部中央的「ポリス手帳」查看优化后的二维码页面。</p>
        </div>
    </div>

    <!-- TAB PAGE 3: CENTRAL HIGH-FIDELITY ACTIVE POLICE BADGE ACCESSIBILITY -->
    <div id="route-police" class="app-page active">
        <div class="police-detail-screen">
            <div class="caution-tape-bg"></div>
            
            <div class="police-content-wrapper">
                <div class="yakiniku-police-header">
                    <i class="fa-solid fa-certificate yp-badge-icon"></i>
                    <div class="yp-title-box">
                        <span>YAKINIKU</span>
                        <span>POLICE</span>
                    </div>
                </div>

                <div class="yellow-coupon-ribbon">
                    COUPON &nbsp; COUPON &nbsp; COUPON &nbsp; COUPON
                </div>

                <div class="barcode-main-card">
                    <div class="barcode-instruction-txt">お会計時に会員バーコードを提示してください</div>
                    
                    <!-- EXTREME HIGH-FIDELITY SCANNABLE BARCODE CSS -->
                    <!-- Content MUST remain exactly 0047-5368-2001 -->
                    <div class="css-barcode-graphic">
                        <div class="barcode-line w-3"></div><div class="barcode-line w-1"></div><div class="barcode-line w-4 space-sm"></div>
                        <div class="barcode-line w-2"></div><div class="barcode-line w-3 space-md"></div><div class="barcode-line w-1"></div>
                        <div class="barcode-line w-4"></div><div class="barcode-line w-2 space-sm"></div><div class="barcode-line w-3"></div>
                        <div class="barcode-line w-1"></div><div class="barcode-line w-4 space-md"></div><div class="barcode-line w-2"></div>
                        <div class="barcode-line w-3"></div><div class="barcode-line w-1 space-sm"></div><div class="barcode-line w-4"></div>
                        <div class="barcode-line w-2"></div><div class="barcode-line w-3 space-md"></div><div class="barcode-line w-4"></div>
                    </div>
                    <div class="barcode-numerical-string">0047-5368-2001</div>
                </div>

                <div class="silver-metallic-card">
                    <div class="metallic-card-dept">YAKINIKU KING POLICE DEPARTMENT</div>
                    <div class="metallic-card-rank-row">
                        <i class="fa-solid fa-shield-halved" style="color: #d4af37; font-size: 24px; margin-right: 10px; filter: drop-shadow(1px 1px 0 #000);"></i>
                        <div class="rank-text">YKPD &nbsp;警視監</div>
                    </div>
                    <div class="divider-lines"></div>
                    <div class="metallic-card-pct-row">
                        <div class="small-text">税込会計総額より</div>
                        <div class="big-pct">50<span>%OFF</span></div>
                    </div>
                </div>

                <div class="timer-countdown-pill">
                    <i class="fa-regular fa-clock"></i> 残り時間 <span class="time-digits" id="live-timer-digits">22:25:50</span>
                </div>

                <div class="police-footer-notes">
                    <h4>警視監 50%OFF</h4>
                    <p>※有人レジのみでご利用いただけます</p>
                </div>
            </div>
        </div>
    </div>

    <!-- GLOBAL FIXED NAVIGATION ACTION BOTTOM TAB BAR -->
    <nav class="fixed-bottom-navigation-tab-bar">
        <div class="nav-item-node" onclick="switchRoute('home', this)">
            <i class="fa-solid fa-house"></i>ホーム
        </div>
        <div class="nav-item-node">
            <i class="fa-solid fa-ticket"></i>クーポン
        </div>
        <div class="central-badge-anchor-point" onclick="switchRoute('police', this)">
            <div class="floating-police-badge-trigger">
                <i class="fa-solid fa-building-shield"></i>
                ポリス手帳
            </div>
        </div>
        <div class="nav-item-node">
            <i class="fa-regular fa-calendar-check"></i>予約状況
        </div>
        <div class="nav-item-node">
            <i class="fa-solid fa-store"></i>店舗検索
        </div>
    </nav>

    <!-- CORE INTERACTION CONTROLLER SCRIPT -->
    <script>
        function switchRoute(routeTarget, elementNode) {
            document.querySelectorAll('.app-page').forEach(page => page.classList.remove('active'));
            const activePage = document.getElementById('route-' + routeTarget);
            if (activePage) activePage.classList.add('active');

            document.querySelectorAll('.nav-item-node').forEach(item => item.classList.remove('active-route'));
            if (elementNode && elementNode.classList.contains('nav-item-node')) {
                elementNode.classList.add('active-route');
            } else if (routeTarget === 'police') {
                document.querySelectorAll('.nav-item-node').forEach(item => item.classList.remove('active-route'));
            }
            window.scrollTo(0, 0);
        }

        // Live Real-Time Ticking Countdown Timer
        let hour = 22, min = 25, sec = 50;
        setInterval(() => {
            sec--;
            if (sec < 0) { sec = 59; min--; }
            if (min < 0) { min = 59; hour--; }
            if (hour < 0) { hour = 23; } 
            
            const formatStr = 
                String(hour).padStart(2, '0') + ':' + 
                String(min).padStart(2, '0') + ':' + 
                String(sec).padStart(2, '0');
                
            const displayNode = document.getElementById('live-timer-digits');
            if(displayNode) displayNode.textContent = formatStr;
        }, 1000);
    </script>
</body>
</html>
